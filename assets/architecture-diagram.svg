<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 740" role="img" aria-label="BeastMode pipeline architecture">
  <defs>
    <style>
      .bg { fill: #0a0a0a; }
      .card { fill: #141414; stroke: #262626; stroke-width: 1; }
      .card-agent { fill: #141414; stroke: #F5A623; stroke-width: 1.25; }
      .card-human { fill: #1a1512; stroke: #f5f5f5; stroke-width: 2; }
      .card-phase { fill: #161616; stroke: #2a2a2a; stroke-width: 1; }
      .card-done { fill: #0f1a12; stroke: #4ade80; stroke-width: 1.5; }
      .label { fill: #f5f5f5; font-family: system-ui, -apple-system, 'Segoe UI', sans-serif; font-size: 13px; font-weight: 500; }
      .label-sm { fill: #c2c2c2; font-family: system-ui, -apple-system, 'Segoe UI', sans-serif; font-size: 10px; font-weight: 400; }
      .label-muted { fill: #9a9a9a; font-family: 'SF Mono', Menlo, Consolas, monospace; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; }
      .label-amber { fill: #F5A623; font-family: 'SF Mono', Menlo, Consolas, monospace; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 500; }
      .label-white { fill: #f5f5f5; font-family: 'SF Mono', Menlo, Consolas, monospace; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; font-weight: 600; }
      .label-green { fill: #4ade80; font-family: 'SF Mono', Menlo, Consolas, monospace; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 500; }
      .tag-agent { fill: #F5A623; font-family: 'SF Mono', Menlo, Consolas, monospace; font-size: 8px; letter-spacing: 1.2px; font-weight: 600; }
      .tag-human { fill: #f5f5f5; font-family: 'SF Mono', Menlo, Consolas, monospace; font-size: 8px; letter-spacing: 1.2px; font-weight: 700; }
      .tag-infra { fill: #9a9a9a; font-family: 'SF Mono', Menlo, Consolas, monospace; font-size: 8px; letter-spacing: 1.2px; font-weight: 500; }
      .flow { stroke: #3a3a3a; stroke-width: 1.25; fill: none; }
      .flow-amber { stroke: #F5A623; stroke-width: 1.25; fill: none; }
      .flow-human { stroke: #f5f5f5; stroke-width: 1.5; fill: none; }
      .flow-loop { stroke: #F5A623; stroke-width: 1; fill: none; stroke-dasharray: 4 3; }
      .phase-label { fill: #9a9a9a; font-family: 'SF Mono', Menlo, Consolas, monospace; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; }
      .num { fill: #F5A623; font-family: 'SF Mono', Menlo, Consolas, monospace; font-size: 10px; font-weight: 500; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3a3a3a"/>
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#F5A623"/>
    </marker>
    <marker id="arrow-white" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f5f5f5"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4ade80"/>
    </marker>
  </defs>

  <rect class="bg" width="1400" height="740"/>

  <!-- Legend (top right) -->
  <g transform="translate(990,32)">
    <text x="0" y="0" class="label-muted">Legend</text>
    <rect x="0" y="12" width="14" height="14" rx="3" class="card-human"/>
    <text x="20" y="23" class="label-sm">human in the loop</text>
    <rect x="128" y="12" width="14" height="14" rx="3" class="card-agent"/>
    <text x="148" y="23" class="label-sm">AI agent</text>
    <rect x="208" y="12" width="14" height="14" rx="3" class="card"/>
    <text x="228" y="23" class="label-sm">infra / data</text>
    <rect x="300" y="12" width="14" height="14" rx="3" class="card-done"/>
    <text x="320" y="23" class="label-sm">done</text>
  </g>

  <!-- ============================================================ -->
  <!-- ROW 1: MAIN PIPELINE (y=120..360)                              -->
  <!-- ============================================================ -->

  <!-- HUMAN — posts task -->
  <g transform="translate(30,210)">
    <rect class="card-human" x="0" y="0" width="90" height="110" rx="6"/>
    <text x="45" y="18" text-anchor="middle" class="tag-human">HUMAN</text>
    <circle cx="45" cy="48" r="12" fill="none" stroke="#f5f5f5" stroke-width="1.75"/>
    <path d="M 24 88 Q 24 66 45 66 Q 66 66 66 88" fill="none" stroke="#f5f5f5" stroke-width="1.75"/>
    <text x="45" y="104" text-anchor="middle" class="label-sm">posts task</text>
  </g>

  <!-- Arrow: Human → Board -->
  <line x1="120" y1="265" x2="158" y2="265" class="flow-human" marker-end="url(#arrow-white)"/>

  <!-- BeastMode Board -->
  <g transform="translate(160,210)">
    <rect class="card" x="0" y="0" width="140" height="110" rx="6"/>
    <text x="70" y="18" text-anchor="middle" class="tag-infra">DATA</text>
    <text x="70" y="36" text-anchor="middle" class="label">Board</text>
    <!-- Kanban mini -->
    <rect x="18" y="46" width="28" height="44" rx="2" fill="#1f1f1f" stroke="#2a2a2a"/>
    <rect x="54" y="46" width="28" height="44" rx="2" fill="#1f1f1f" stroke="#2a2a2a"/>
    <rect x="90" y="46" width="28" height="44" rx="2" fill="#1f1f1f" stroke="#2a2a2a"/>
    <rect x="21" y="50" width="22" height="6" rx="1" fill="#2a2a2a"/>
    <rect x="21" y="60" width="22" height="6" rx="1" fill="#2a2a2a"/>
    <rect x="57" y="50" width="22" height="6" rx="1" fill="#F5A623"/>
    <rect x="57" y="60" width="22" height="6" rx="1" fill="#2a2a2a"/>
    <rect x="93" y="50" width="22" height="6" rx="1" fill="#2a2a2a"/>
    <text x="70" y="102" text-anchor="middle" class="label-sm">FastAPI · SQLite</text>
  </g>

  <!-- Arrow: Board → Daemon -->
  <line x1="300" y1="265" x2="338" y2="265" class="flow" marker-end="url(#arrow)"/>
  <text x="319" y="256" text-anchor="middle" class="label-sm">poll 60s</text>

  <!-- Daemon -->
  <g transform="translate(340,210)">
    <rect class="card" x="0" y="0" width="130" height="110" rx="6"/>
    <text x="65" y="18" text-anchor="middle" class="tag-infra">INFRA</text>
    <text x="65" y="36" text-anchor="middle" class="label">Daemon</text>
    <!-- N-slot icon -->
    <rect x="22" y="48" width="22" height="22" rx="3" fill="#1f1f1f" stroke="#F5A623" stroke-width="0.8"/>
    <text x="33" y="63" text-anchor="middle" fill="#F5A623" font-family="SF Mono,Menlo,monospace" font-size="9">S0</text>
    <rect x="52" y="48" width="22" height="22" rx="3" fill="#1f1f1f" stroke="#F5A623" stroke-width="0.8"/>
    <text x="63" y="63" text-anchor="middle" fill="#F5A623" font-family="SF Mono,Menlo,monospace" font-size="9">S1</text>
    <rect x="82" y="48" width="22" height="22" rx="3" fill="#1f1f1f" stroke="#2a2a2a" stroke-dasharray="2 2"/>
    <text x="93" y="63" text-anchor="middle" fill="#555" font-family="SF Mono,Menlo,monospace" font-size="9">…</text>
    <text x="65" y="88" text-anchor="middle" class="label-sm">Python scheduler</text>
    <text x="65" y="102" text-anchor="middle" class="label-sm">priority N-slot</text>
  </g>

  <!-- Arrow: Daemon → Phase 1 -->
  <line x1="470" y1="265" x2="508" y2="265" class="flow" marker-end="url(#arrow)"/>

  <!-- PHASE 1: Spec + Scenarios -->
  <g transform="translate(510,140)">
    <rect class="card-phase" x="0" y="0" width="280" height="250" rx="10"/>
    <text x="140" y="22" text-anchor="middle" class="phase-label">Phase 1 — Spec &amp; Scenarios</text>

    <!-- Spec Refiner -->
    <rect class="card-agent" x="16" y="38" width="248" height="54" rx="6"/>
    <text x="30" y="54" class="tag-agent">AGENT</text>
    <text x="30" y="72" class="label">Spec Refiner</text>
    <text x="30" y="86" class="label-sm">NLSpec — engineering-grade requirements</text>

    <!-- Planner -->
    <rect class="card-agent" x="16" y="100" width="248" height="54" rx="6"/>
    <text x="30" y="116" class="tag-agent">AGENT</text>
    <text x="30" y="134" class="label">Planner</text>
    <text x="30" y="148" class="label-sm">dependency-aware task graph</text>

    <!-- Scenario Designer -->
    <rect class="card-agent" x="16" y="162" width="248" height="54" rx="6"/>
    <text x="30" y="178" class="tag-agent">AGENT</text>
    <text x="30" y="196" class="label">Scenario Designer</text>
    <text x="30" y="210" class="label-sm">holdout scenarios (coder can't see)</text>

    <text x="140" y="236" text-anchor="middle" class="label-sm">Opus 4.6 · artifacts posted to Board</text>
  </g>

  <!-- Arrow: Phase 1 artifacts → Board -->
  <path d="M 650 140 Q 650 100 480 100 Q 230 100 230 210" class="flow-amber" marker-end="url(#arrow-amber)" fill="none"/>
  <text x="440" y="92" text-anchor="middle" class="label-sm">post spec + scenarios for approval</text>

  <!-- Arrow: Phase 1 → Human Gate -->
  <line x1="790" y1="265" x2="828" y2="265" class="flow" marker-end="url(#arrow)"/>

  <!-- HUMAN GATE — approve/revise -->
  <g transform="translate(830,210)">
    <rect class="card-human" x="0" y="0" width="110" height="110" rx="6"/>
    <text x="55" y="18" text-anchor="middle" class="tag-human">HUMAN</text>
    <text x="55" y="44" text-anchor="middle" class="label">Approve</text>
    <text x="55" y="62" text-anchor="middle" class="label">or Revise</text>
    <text x="55" y="86" text-anchor="middle" class="label-sm">reads spec +</text>
    <text x="55" y="100" text-anchor="middle" class="label-sm">scenarios on Board</text>
  </g>

  <!-- Arrow: Human Gate → Phase 2 -->
  <line x1="940" y1="265" x2="978" y2="265" class="flow-human" marker-end="url(#arrow-white)"/>
  <text x="958" y="256" text-anchor="middle" class="label-white">approved</text>

  <!-- PHASE 2: Build-Verify Loop -->
  <g transform="translate(980,140)">
    <rect class="card-phase" x="0" y="0" width="310" height="250" rx="10"/>
    <text x="155" y="22" text-anchor="middle" class="phase-label">Phase 2 — Build-Verify Loop</text>

    <!-- Coder -->
    <rect class="card-agent" x="18" y="50" width="128" height="72" rx="6"/>
    <text x="30" y="66" class="tag-agent">AGENT</text>
    <text x="82" y="90" text-anchor="middle" class="label">Coder</text>
    <text x="82" y="106" text-anchor="middle" class="label-sm">opus → sonnet</text>
    <text x="82" y="118" text-anchor="middle" class="label-sm">worktrees</text>

    <!-- Verifier -->
    <rect class="card-agent" x="166" y="50" width="128" height="72" rx="6"/>
    <text x="178" y="66" class="tag-agent">AGENT</text>
    <text x="230" y="90" text-anchor="middle" class="label">Verifier</text>
    <text x="230" y="106" text-anchor="middle" class="label-sm">playwright MCP</text>
    <text x="230" y="118" text-anchor="middle" class="label-sm">satisfaction score</text>

    <!-- Flow: Coder → Verifier -->
    <line x1="146" y1="86" x2="166" y2="86" class="flow-amber" marker-end="url(#arrow-amber)"/>

    <!-- Controller -->
    <rect class="card-agent" x="60" y="148" width="190" height="66" rx="6"/>
    <text x="72" y="164" class="tag-agent">AGENT</text>
    <text x="155" y="184" text-anchor="middle" class="label">Convergence Controller</text>
    <text x="155" y="198" text-anchor="middle" class="label-sm">iterate or ship decision</text>
    <text x="155" y="210" text-anchor="middle" class="label-sm">feedback (no scenario leak)</text>

    <!-- Flow: Verifier → Controller -->
    <path d="M 230 122 L 230 148" class="flow-amber" marker-end="url(#arrow-amber)" fill="none"/>
    <!-- Flow: Controller → Coder (loop) -->
    <path d="M 60 176 L 36 176 L 36 86 L 60 86" class="flow-loop" marker-end="url(#arrow-amber)" fill="none"/>
    <text x="28" y="134" text-anchor="middle" class="label-sm" fill="#E5961A">loop</text>

    <text x="155" y="236" text-anchor="middle" class="label-sm">converges at satisfaction ≥ 0.85</text>
  </g>

  <!-- Arrow: Phase 2 → Ship -->
  <line x1="1290" y1="265" x2="1328" y2="265" class="flow-amber" marker-end="url(#arrow-amber)"/>

  <!-- Ship (agent) -->
  <g transform="translate(1330,210)">
    <rect class="card-agent" x="0" y="0" width="56" height="110" rx="6"/>
    <text x="28" y="18" text-anchor="middle" class="tag-agent">AGENT</text>
    <text x="28" y="40" text-anchor="middle" class="label">Ship</text>
    <text x="28" y="60" text-anchor="middle" class="label-sm">PR</text>
    <text x="28" y="74" text-anchor="middle" class="label-sm">review</text>
    <text x="28" y="88" text-anchor="middle" class="label-sm">merge</text>
    <text x="28" y="102" text-anchor="middle" class="label-sm">CI</text>
  </g>

  <!-- ============================================================ -->
  <!-- ROW 2: DEPLOYMENT (y=440..540)                                 -->
  <!-- ============================================================ -->

  <!-- Connection from Ship down to deployment row -->
  <path d="M 1358 320 L 1358 430 L 500 430 L 500 488" class="flow" marker-end="url(#arrow)" fill="none"/>
  <text x="920" y="422" text-anchor="middle" class="label-sm">gh pr merge</text>

  <g transform="translate(70,440)">
    <text x="0" y="14" class="phase-label">Deployment — your cloud of choice</text>
  </g>

  <!-- GitHub (data) -->
  <g transform="translate(440,470)">
    <rect class="card" x="0" y="0" width="130" height="70" rx="6"/>
    <text x="65" y="16" text-anchor="middle" class="tag-infra">CI / SCM</text>
    <text x="65" y="38" text-anchor="middle" class="label">GitHub</text>
    <text x="65" y="54" text-anchor="middle" class="label-sm">PR · Actions CI</text>
  </g>

  <line x1="576" y1="505" x2="614" y2="505" class="flow" marker-end="url(#arrow)"/>

  <!-- Registry (generic) -->
  <g transform="translate(616,470)">
    <rect class="card" x="0" y="0" width="140" height="70" rx="6"/>
    <text x="70" y="16" text-anchor="middle" class="tag-infra">REGISTRY</text>
    <text x="70" y="38" text-anchor="middle" class="label">Container Registry</text>
    <text x="70" y="54" text-anchor="middle" class="label-sm">ECR · GHCR · Docker Hub</text>
  </g>

  <line x1="762" y1="505" x2="800" y2="505" class="flow" marker-end="url(#arrow)"/>

  <!-- Compute (generic) -->
  <g transform="translate(802,470)">
    <rect class="card" x="0" y="0" width="140" height="70" rx="6"/>
    <text x="70" y="16" text-anchor="middle" class="tag-infra">COMPUTE</text>
    <text x="70" y="38" text-anchor="middle" class="label">Runtime</text>
    <text x="70" y="54" text-anchor="middle" class="label-sm">ECS · K8s · Cloud Run · VM</text>
  </g>

  <line x1="948" y1="505" x2="986" y2="505" class="flow-amber" marker-end="url(#arrow-amber)"/>

  <!-- Production Verifier (agent) -->
  <g transform="translate(988,460)">
    <rect class="card-agent" x="0" y="0" width="160" height="90" rx="6"/>
    <text x="12" y="16" class="tag-agent">AGENT</text>
    <text x="80" y="38" text-anchor="middle" class="label">Prod Verifier</text>
    <text x="80" y="54" text-anchor="middle" class="label-sm">playwright + screenshots</text>
    <text x="80" y="68" text-anchor="middle" class="label-sm">auto-rollback on failure</text>
    <text x="80" y="82" text-anchor="middle" class="label-sm">proof attached to task</text>
  </g>

  <line x1="1154" y1="505" x2="1192" y2="505" class="flow-amber" marker-end="url(#arrow-green)"/>

  <!-- Done -->
  <g transform="translate(1194,470)">
    <rect class="card-done" x="0" y="0" width="90" height="70" rx="6"/>
    <text x="45" y="16" text-anchor="middle" class="label-green">status</text>
    <path d="M 28 42 L 38 52 L 60 30" stroke="#4ade80" stroke-width="2.5" fill="none"/>
    <text x="45" y="64" text-anchor="middle" class="label" fill="#4ade80">done</text>
  </g>

  <!-- ============================================================ -->
  <!-- ROW 3: RESILIENCE (y=600..720)                                 -->
  <!-- ============================================================ -->

  <g transform="translate(70,600)">
    <text x="0" y="14" class="phase-label">Resilience — autonomous recovery</text>
  </g>

  <!-- Self-Healing (agent) -->
  <g transform="translate(70,630)">
    <rect class="card-agent" x="0" y="0" width="400" height="90" rx="6"/>
    <text x="14" y="18" class="tag-agent">AGENT</text>
    <text x="14" y="40" class="label">Self-Healing</text>
    <text x="14" y="58" class="label-sm">5 failures → Stuck → Tier 0 (deterministic fix)</text>
    <text x="14" y="74" class="label-sm">Tier 1 (Claude diagnoses + patches) · 3 attempts max</text>
  </g>

  <!-- Auto-Rollback -->
  <g transform="translate(490,630)">
    <rect class="card" x="0" y="0" width="400" height="90" rx="6"/>
    <text x="14" y="18" class="tag-infra">DAEMON</text>
    <text x="14" y="40" class="label">Auto-Rollback &amp; Prod-Fix</text>
    <text x="14" y="58" class="label-sm">prod verify fails → revert to last-good deploy</text>
    <text x="14" y="74" class="label-sm">coder retries up to 3× with prior-failure context</text>
  </g>

  <!-- Satisfaction Ceiling -->
  <g transform="translate(910,630)">
    <rect class="card" x="0" y="0" width="420" height="90" rx="6"/>
    <text x="14" y="18" class="tag-infra">POLICY</text>
    <text x="14" y="40" class="label">Satisfaction Ceiling</text>
    <text x="14" y="58" class="label-sm">exhausted prod-fix + sat ≥ 0.65 → auto-accept Done</text>
    <text x="14" y="74" class="label-sm">(Playwright can't test everything: API-only, hover, cron)</text>
  </g>
</svg>
