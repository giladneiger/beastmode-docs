<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% if page.title %}{{ page.title }} — BeastMode{% else %}BeastMode — Dark Factory{% endif %}</title>
<meta name="description" content="{{ site.description }}">
<meta name="theme-color" content="#0a0a0a">
<link rel="icon" type="image/svg+xml" href="{{ '/assets/logo/favicon.svg' | relative_url }}">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0a0a0a; --surface: #141414; --border: #262626; --divider: #1f1f1f;
  --muted: #9a9a9a; --secondary: #c2c2c2; --body: #dcdcdc; --text: #f5f5f5;
  --accent: #F5A623; --accent-hover: #E5961A; --success: #4ade80;
  --font-sans: system-ui, -apple-system, 'Segoe UI', sans-serif;
  --font-mono: 'SF Mono', 'Fira Code', 'JetBrains Mono', Consolas, monospace;
}
html { scroll-behavior: smooth; scroll-padding-top: 90px; }
body {
  font-family: var(--font-sans); background: var(--bg); color: var(--body);
  line-height: 1.7; font-size: 16px;
  background-image: radial-gradient(circle at 1px 1px, rgba(245,166,35,0.03) 1px, transparent 0);
  background-size: 32px 32px;
  -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
}
::selection { background: rgba(245,166,35,0.25); color: var(--text); }
a { color: var(--accent); text-decoration: none; border-bottom: 0.5px solid transparent; transition: color 0.15s ease, border-color 0.15s ease; }
a:hover { color: var(--accent-hover); border-bottom-color: var(--accent-hover); }

/* ── Nav ── */
nav.top {
  position: sticky; top: 0; z-index: 100;
  background: rgba(10,10,10,0.92); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  border-bottom: 0.5px solid var(--divider);
  padding: 14px 40px;
  display: flex; align-items: center; justify-content: space-between;
}
nav.top .logo-link { display: flex; border: none; }
nav.top .logo { height: 48px; display: block; }
nav.top .links { display: flex; gap: 28px; font-family: var(--font-mono); font-size: 13px; }
nav.top .links a { color: var(--secondary); border: none; }
nav.top .links a:hover { color: var(--text); }
nav.top .links a.accent { color: var(--accent); }
nav.top .links a.accent:hover { color: var(--accent-hover); }

/* ── Doc layout ── */
.doc-wrap { max-width: 840px; margin: 0 auto; padding: 72px 40px 96px; }
.doc-wrap > p:first-of-type { font-size: 17px; color: var(--secondary); }
.breadcrumb { font-family: var(--font-mono); font-size: 11px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 24px; }
.breadcrumb a { color: var(--accent); border: none; }
.breadcrumb a:hover { color: var(--accent-hover); }

/* ── Markdown prose ── */
.doc-wrap h1, .doc-wrap h2, .doc-wrap h3, .doc-wrap h4, .doc-wrap h5, .doc-wrap h6 {
  color: var(--text); font-family: var(--font-sans); font-weight: 500;
  letter-spacing: -0.3px; margin-top: 2.2em; margin-bottom: 0.7em; line-height: 1.25;
}
.doc-wrap h1 { font-size: 40px; margin-top: 0; letter-spacing: -0.8px; }
.doc-wrap h2 { font-size: 26px; padding-top: 1em; border-top: 0.5px solid var(--divider); }
.doc-wrap h3 { font-size: 20px; }
.doc-wrap h4 { font-size: 16px; color: var(--secondary); text-transform: uppercase; letter-spacing: 1.5px; font-family: var(--font-mono); }
.doc-wrap h5, .doc-wrap h6 { font-size: 14px; color: var(--secondary); }

.doc-wrap p { margin-bottom: 1.2em; color: var(--body); }
.doc-wrap strong { color: var(--text); font-weight: 600; }
.doc-wrap em { color: var(--secondary); font-style: italic; }

.doc-wrap ul, .doc-wrap ol { margin: 0.8em 0 1.4em 1.5em; color: var(--body); }
.doc-wrap li { margin-bottom: 0.5em; padding-left: 0.3em; }
.doc-wrap li > ul, .doc-wrap li > ol { margin-top: 0.5em; margin-bottom: 0.5em; }

.doc-wrap blockquote {
  border-left: 2px solid var(--accent); padding: 0.3em 0 0.3em 1.4em; margin: 1.6em 0;
  color: var(--secondary); font-style: normal;
  background: rgba(245,166,35,0.03); border-radius: 0 4px 4px 0;
}

.doc-wrap code {
  font-family: var(--font-mono); font-size: 0.88em;
  background: #1a1a1a; color: var(--accent); padding: 2px 6px;
  border-radius: 3px; border: 0.5px solid var(--border);
}
.doc-wrap pre {
  background: var(--surface); border: 0.5px solid var(--border); border-radius: 6px;
  padding: 20px 22px; overflow-x: auto; margin: 1.4em 0;
  font-size: 13.5px; line-height: 1.65;
}
.doc-wrap pre code { background: transparent; color: var(--text); padding: 0; border: none; font-size: 1em; }

.doc-wrap table { width: 100%; border-collapse: collapse; margin: 1.4em 0; font-size: 14px; }
.doc-wrap th, .doc-wrap td {
  border-bottom: 0.5px solid var(--divider); padding: 10px 14px; text-align: left;
}
.doc-wrap th { color: var(--text); font-weight: 500; background: var(--surface); border-top: 0.5px solid var(--divider); }
.doc-wrap td { color: var(--body); }
.doc-wrap tr:hover td { background: rgba(255,255,255,0.015); }

.doc-wrap hr { border: none; border-top: 0.5px solid var(--divider); margin: 2.4em 0; }

.doc-wrap img { max-width: 100%; height: auto; border-radius: 6px; border: 0.5px solid var(--border); margin: 1em 0; }

/* ── Rouge syntax highlighting (dark) ── */
.highlight .c, .highlight .cm, .highlight .c1, .highlight .cs { color: var(--muted); font-style: italic; }
.highlight .k, .highlight .kc, .highlight .kd, .highlight .kn, .highlight .kp, .highlight .kr, .highlight .kt { color: var(--accent); }
.highlight .s, .highlight .s1, .highlight .s2, .highlight .sb, .highlight .sc, .highlight .sd, .highlight .se, .highlight .sh, .highlight .si, .highlight .sx, .highlight .sr, .highlight .ss { color: #a5e4a0; }
.highlight .m, .highlight .mf, .highlight .mh, .highlight .mi, .highlight .mo, .highlight .il { color: #f8ba5f; }
.highlight .nb, .highlight .nc, .highlight .no, .highlight .nd, .highlight .ni, .highlight .ne, .highlight .nf, .highlight .nl, .highlight .nn, .highlight .nv { color: var(--text); }
.highlight .o, .highlight .ow { color: var(--secondary); }
.highlight .p { color: var(--secondary); }
.highlight .err { color: #f87171; }

/* ── Footer ── */
footer { border-top: 0.5px solid var(--divider); padding: 32px 40px; margin-top: 40px; display: flex; align-items: center; justify-content: space-between; max-width: 1280px; margin-left: auto; margin-right: auto; font-family: var(--font-mono); font-size: 11px; }
footer .left a { display: flex; align-items: center; gap: 10px; color: var(--muted); border: none; }
footer .left a:hover { color: var(--body); }
footer .right { color: var(--muted); }
footer .right a { color: var(--secondary); border: none; }
footer .right a:hover { color: var(--body); }

@media (max-width: 768px) {
  nav.top { padding: 12px 22px; }
  nav.top .logo { height: 40px; }
  nav.top .links { gap: 16px; font-size: 12px; }
  .doc-wrap { padding: 48px 22px 72px; }
  .doc-wrap h1 { font-size: 30px; }
  .doc-wrap h2 { font-size: 22px; }
  .doc-wrap h3 { font-size: 18px; }
  body { font-size: 15px; }
  footer { padding: 24px 22px; flex-direction: column; gap: 12px; align-items: flex-start; }
}
</style>
</head>
<body>

<nav class="top">
  <a href="{{ '/' | relative_url }}" class="logo-link" aria-label="BeastMode home">

        <rect fill="#f0f0f0" x="12" y="-12" width="44" height="76" rx="2"/>
        <rect fill="#f0f0f0" x="20" y="-50" width="13" height="42" rx="1.5"/>
        <rect fill="#f0f0f0" x="39" y="-32" width="10" height="24" rx="1.5"/>
        <rect fill="#0a0a0a" x="-43" y="18" width="10" height="9" rx="1"/>
        <rect fill="#0a0a0a" x="-28" y="18" width="10" height="9" rx="1"/>
        <rect fill="#0a0a0a" x="-43" y="34" width="10" height="9" rx="1"/>
        <rect fill="#0a0a0a" x="-28" y="34" width="10" height="9" rx="1"/>
        <rect fill="#0a0a0a" x="20" y="0" width="10" height="10" rx="1"/>
        <rect fill="#0a0a0a" x="38" y="0" width="10" height="10" rx="1"/>
        <rect fill="#0a0a0a" x="20" y="18" width="10" height="10" rx="1"/>
        <rect fill="#0a0a0a" x="38" y="18" width="10" height="10" rx="1"/>
        <rect fill="#f0f0f0" x="-58" y="64" width="120" height="3" rx="1.5"/>
        <line stroke="#F5A623" fill="none" x1="26" y1="-54" x2="26" y2="-90" stroke-width="3.5" stroke-linecap="round"/>
        <polygon fill="#F5A623" points="26,-90 18,-76 34,-76"/>
        <line stroke="#F5A623" fill="none" x1="14" y1="-56" x2="6" y2="-76" stroke-width="1.8" stroke-linecap="round"/>
        <polygon fill="#F5A623" points="6,-76 1,-67 11,-67"/>
        <line stroke="#F5A623" fill="none" x1="40" y1="-46" x2="47" y2="-68" stroke-width="1.8" stroke-linecap="round"/>
        <polygon fill="#F5A623" points="47,-68 42,-59 52,-59"/>
        <circle fill="#F5A623" cx="26" cy="-98" r="2.5"/>
        <circle fill="#F5A623" cx="0" cy="-82" r="1.5"/>
        <circle fill="#F5A623" cx="52" cy="-74" r="1.5"/>
      </g>
      <text fill="#f0f0f0" x="90" y="44" font-family="system-ui,-apple-system,sans-serif" font-size="26" font-weight="500" letter-spacing="6">BEASTMODE</text>
      <text fill="#8a8a8a" x="90" y="62" font-family="system-ui,-apple-system,sans-serif" font-size="9" letter-spacing="3">DARK FACTORY</text>
    </svg>
  </a>
  <div class="links">
    <a href="{{ '/#docs' | relative_url }}">docs</a>
    <a href="{{ '/#architecture' | relative_url }}">architecture</a>
    <a href="{{ '/#quickstart' | relative_url }}">quickstart</a>
    <a href="https://github.com/develeap/beastmode" class="accent" target="_blank" rel="noopener">github</a>
  </div>
</nav>

<main class="doc-wrap">
  {% if page.url != "/" and page.url != "/index.html" %}
  <div class="breadcrumb"><a href="{{ '/' | relative_url }}">HOME</a> / DOCS</div>
  {% endif %}
  {{ content }}
</main>

<footer>
  <div class="left">
    <a href="https://develeap.com" target="_blank" rel="noopener">
      <svg viewBox="0 0 20 16" width="14" height="11" aria-hidden="true">
        <circle cx="6" cy="8" r="5.5" fill="#F5A623"/>

      </svg>
      <span>manufactured by develeap</span>

  </div>
  <div class="right">MIT license — <a href="https://github.com/develeap/beastmode" target="_blank" rel="noopener">github.com/develeap/beastmode</a></div>
</footer>

</body>
</html>
